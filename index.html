<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to top,#ffb6d9,#ffcce6);
overflow:hidden;
}

/* pages */
.page{
display:none;
position:absolute;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
border:6px solid white;
border-radius:20px;
}
.active{display:flex;}

h1,h2,p{color:white;text-shadow:2px 2px 10px #ff66a3;}

/* 👉 TEXT COLOR CHANGE */
.darkText{
color:#5a0066 !important; /* purple */
text-shadow:none;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4da6;
color:white;
font-size:16px;
margin-top:20px;
}

/* clouds */
.cloud{
position:absolute;
font-size:40px;
animation:moveClouds linear infinite;
opacity:0.8;
}
@keyframes moveClouds{
from{transform:translateX(-100px);}
to{transform:translateX(120vw);}
}

/* falling */
.fall{
position:fixed;
top:-50px;
font-size:24px;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* glow */
.glow{animation:glow 2s infinite alternate;}
@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 30px #ff66a3;}
}

/* fancy */
.fancy{
font-family:'Brush Script MT',cursive;
font-size:40px;
}

/* cake */
.cake{width:180px;cursor:pointer;}
.cake:hover{transform:scale(1.1);}

/* fireworks */
.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1.2s forwards;
}
@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

/* typing */
.typing{
width:85%;
white-space:pre-line;
font-size:15px;
}

/* frame */
.frame{
border:5px dashed white;
padding:10px;
border-radius:20px;
}

/* slideshow */
.slideshow img{
width:260px;
border-radius:20px;
box-shadow:0 0 20px pink;
}

/* popup */
.popup{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:20px;
display:none;
color:#ff4da6;
font-weight:bold;
}

/* calendar */
.calendar{
background:white;
padding:15px;
border-radius:20px;
color:#ff4da6;
box-shadow:0 0 20px pink;
}
.days{
display:grid;
grid-template-columns:repeat(7,40px);
gap:5px;
justify-content:center;
}
.days div{padding:8px;border-radius:10px;}
.heart{
background:#ff4da6;
color:white;
border-radius:50%;
animation:pulse 1s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.white-btn{
background:white !important;
color:#ff4da6 !important;
}
</style>
</head>

<body>

<!-- clouds -->
<div class="cloud" style="top:5%;animation-duration:20s;">☁️</div>
<div class="cloud" style="top:15%;animation-duration:18s;">☁️</div>
<div class="cloud" style="top:30%;animation-duration:22s;">☁️</div>
<div class="cloud" style="bottom:20%;animation-duration:15s;">☁️</div>
<div class="cloud" style="bottom:5%;animation-duration:25s;">☁️</div>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<h1 class="glow fancy darkText">Wish you a Happy Birthday My Love</h1>
<button onclick="go(2)">Next</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<h2 class="darkText" style="position:absolute;top:20px;">It's Your Birthday</h2>

<div class="calendar">
<h3>April 2026</h3>
<div class="days">
<div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
<div></div><div></div><div></div>
<div>1</div><div>2</div><div>3</div><div>4</div>
<div>5</div><div>6</div><div>7</div><div>8</div>
<div>9</div><div>10</div><div>11</div><div>12</div>
<div>13</div><div>14</div><div>15</div><div>16</div>
<div>17</div><div>18</div><div>19</div><div>20</div>
<div>21</div><div>22</div><div>23</div><div>24</div>
<div>25</div><div>26</div>
<div class="heart">27 ❤️</div>
<div>28</div><div>29</div><div>30</div>
</div>
</div>

<button onclick="go(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<audio id="bday" src="birthday.mp3"></audio>
<img src="cake.png" class="cake" onclick="cakeClick()">
<p class="darkText">Click the Cake 🎂</p>
<h2 id="msg"></h2>
<button id="n3" style="display:none;" onclick="go(4)">Next</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
<h2 class="darkText">𝐁𝐢𝐫𝐭𝐡𝐝𝐚𝐲 𝐖𝐢𝐬𝐡</h2>

<div class="typing" id="type"></div>

<!-- 👉 PHOTO CHANGE -->
<div class="frame">
<img src="wishphoto.jpg" width="200">
</div>

<button id="n4" style="display:none;" onclick="go(5)">Next</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="p5">
<div class="popup white-btn darkText" id="gift">🎁 Surprise Gift</div>

<video id="vid" width="300" controls style="display:none; border-radius:15px;">
<source src="video.mp4" type="video/mp4">
</video>

<button id="n5" style="display:none;" onclick="go(6)">Next</button>
</div>

<!-- PAGE 6 -->
<div class="page" id="p6">
<audio id="finalSong" src="song.mp3"></audio>

<div class="slideshow">
<img id="slide">
</div>

<!-- 👉 FINAL LOVE POPUP -->
<div class="popup" id="end">
<img src="finalphoto.jpg" width="200"><br><br>
I love you baba ❤️
</div>
</div>

<script>
let cur=1;

function go(n){
document.getElementById("p"+cur).classList.remove("active");
document.getElementById("p"+n).classList.add("active");
cur=n;

if(n==3) document.getElementById("bday").play();
if(n==4) typing();
if(n==5) gift();
if(n==6) slideShow();
}

/* falling */
setInterval(()=>{
const items=["🌸","🧸","🎂","🎀","💖"];
let el=document.createElement("div");
el.className="fall";
el.innerText=items[Math.floor(Math.random()*items.length)];
el.style.left=Math.random()*100+"vw";
el.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(el);
setTimeout(()=>el.remove(),6000);
},300);

/* fireworks */
function fireworks(){
for(let i=0;i<80;i++){
let f=document.createElement("div");
f.className="firework";
f.style.background=`hsl(${Math.random()*360},100%,60%)`;
f.style.left="50%";
f.style.top="50%";
f.style.setProperty('--x',(Math.random()*500-250)+"px");
f.style.setProperty('--y',(Math.random()*500-250)+"px");
document.body.appendChild(f);
setTimeout(()=>f.remove(),1200);
}
}

function cakeClick(){
document.getElementById("msg").innerText="Welcome to 22nd ❤️";
fireworks();
setTimeout(()=>{document.getElementById("n3").style.display="block";},4000);
}

/* typing */
let txt=`🎂 Happy Birthday, My Punchi Mala 🌸

On your special day, I just want you to know how truly special you are to me. You fill my life with happiness, love, and beautiful moments I’ll always cherish.

Please take good care of yourself, stay safe, and never lose that lovely smile of yours. 💫

I wish you a future full of success, peace, and endless happiness. May all your dreams come true, and may life always treat you kindly.

No matter where life takes us, you will always have a special place in my heart. ❤️

Happy Birthday once again, my Punchi Mala. I love you so much. 🌹`;

let i=0;
function typing(){
if(i<txt.length){
document.getElementById("type").innerHTML+=txt.charAt(i);
i++;
setTimeout(typing,25);
}else{
setTimeout(()=>{document.getElementById("n4").style.display="block";},5000);
}
}

/* gift */
function gift(){
let g=document.getElementById("gift");
g.style.display="block";

g.onclick=()=>{
g.style.display="none";

let v=document.getElementById("vid");
v.style.display="block";
v.play();

v.onended=()=>{
document.getElementById("n5").style.display="block";
}
}
}

/* slideshow */
let imgs=[
"1757830238535.jpg","1762322355498.jpg","1762677192167.jpg","1762677192464.jpg",
"c9caa9ba9ebd12b41492f733abdb4c41.jpg","IMG-20241106-WA0077.jpg",
"IMG-20250226-WA0003.jpg","IMG-20250320-WA0010.jpg","IMG-20250529-WA0014.jpg",
"IMG-20250611-WA0028.jpg","IMG-20250627-WA0035.jpg","IMG-20250806-WA0002.jpg",
"IMG-20250902-WA0007.jpg","IMG-20250902-WA0006.jpg","IMG-20250911-WA0010.jpg",
"IMG-20251005-WA0200.jpg","IMG-20250914-WA0017.jpg","IMG-20251009-WA0009.jpg",
"IMG-20251026-WA0014.jpg","IMG-20251018-WA0008.jpg","IMG-20260101-WA0006.jpg",
"IMG-20260120-WA0054.jpg","IMG-20260127-WA0022.jpg"
];

let idx=0;

function slideShow(){
let img=document.getElementById("slide");
let audio=document.getElementById("finalSong");
audio.play();

setInterval(()=>{
img.src=imgs[idx];
idx=(idx+1)%imgs.length;
},2000);

audio.onended=()=>{
document.getElementById("end").style.display="block";
}
}
</script>

</body>
</html>
